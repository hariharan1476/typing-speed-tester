<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Typing Speed Tester</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>Typing Speed Tester</h1>

    <p id="text">
        Artificial Intelligence is transforming the future of technology and creating new opportunities.
    </p>

    <textarea id="input" placeholder="Start typing here..." oninput="startTest()"></textarea>

    <div class="results">
        <p>Time: <span id="time">0</span> sec</p>
        <p>WPM: <span id="wpm">0</span></p>
        <p>Accuracy: <span id="accuracy">0</span>%</p>
    </div>

    <button onclick="restart()">Restart</button>
</div>

<script src="script.js"></script>

</body>
</html>
